name: upstream-watch

# Watches upstream for every overlaid addon (gears, AF3, zephyr) and opens/updates a
# single tracking issue when a new version appears -- classifying each as SAFE
# (bump base_version, the same overlay applies) or MANUAL (a human must re-merge
# specific files). This is the ONE upstream watcher for the ecosystem; it
# replaces the old pov-modified-heb gears-auto-update.yml now that the overlays
# live here.

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: upstream-watch
  cancel-in-progress: true

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: Check upstream
        id: check
        run: python tools/check_upstream.py overlays

      - name: Open / update tracking issue
        if: steps.check.outputs.has_update == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Upstream update available for overlaid addons"
          body_file="${{ steps.check.outputs.summary_file }}"
          {
            echo ""
            echo "---"
            echo "How to apply a **SAFE** update:"
            echo "1. Bump \`base_version\` (and for gears, drop the new clean \`base/<id>-<ver>.zip\` + update \`base_zip_local\`)."
            echo "2. Bump \`overlay_version\` if you also changed Hebrew files."
            echo "3. Push; \`build-and-release\` reconstructs and ships it."
            echo ""
            echo "A **MANUAL** update means an upstream file we overlay changed -- re-merge just those files into \`overlays/<id>/files/\` before bumping."
            echo ""
            echo "_Auto-generated by upstream-watch._"
          } >> "$body_file"
          existing=$(gh issue list --state open --search "in:title $title" --json number -q '.[0].number')
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --body-file "$body_file"
            echo "updated issue #$existing"
          else
            gh issue create --title "$title" --body-file "$body_file"
          fi

      # ------------------------------------------------------------------
      # Auto-adopt SAFE updates. DORMANT by default -- this whole step is
      # skipped unless the repo variable AUTO_ADOPT is set to 'true'
      # (Settings > Secrets and variables > Actions > Variables). Until then
      # the watcher only alerts (issue above) and you adopt manually with
      # `python tools/adopt_upstream.py overlays/<id>`. Flip AUTO_ADOPT on
      # once you've watched a live update land in Kodi and trust the flow.
      # MANUAL updates are never auto-adopted -- they always wait for a human.
      # ------------------------------------------------------------------
      - name: Auto-adopt SAFE updates (gated by AUTO_ADOPT var)
        id: adopt
        if: vars.AUTO_ADOPT == 'true' && steps.check.outputs.has_update == 'true'
        run: python tools/adopt_upstream.py --all-safe --yes --no-build

      - name: Commit & push adopted bases
        if: vars.AUTO_ADOPT == 'true' && steps.adopt.outputs.adopted == 'true'
        run: |
          git config user.name "masterkodi-ci"
          git config user.email "ci@masterkodi.local"
          git add overlays/
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "ci: auto-adopt SAFE upstream update(s): ${{ steps.adopt.outputs.adopted_list }}"
            git push origin HEAD:main
            # build-and-release triggers on overlays/** and reships the merged addon
          fi
