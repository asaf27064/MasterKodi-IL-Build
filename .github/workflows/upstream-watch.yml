name: upstream-watch

# Watches upstream for every overlaid addon (gears, AF3, zephyr) and opens/updates a
# single tracking issue when a new version appears -- classifying each as SAFE
# (bump base_version, the same overlay applies) or MANUAL (a human must re-merge
# specific files). This is the ONE upstream watcher for the ecosystem; it
# replaces the old pov-modified-heb gears-auto-update.yml now that the overlays
# live here.

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write
  # needed for the explicit `gh workflow run` dispatches after an auto-adopt
  # push (GITHUB_TOKEN pushes don't fire on-push workflows by themselves)
  actions: write

concurrency:
  group: upstream-watch
  cancel-in-progress: true

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: Check upstream
        id: check
        run: python tools/check_upstream.py overlays

      - name: Check upstream (Piers overlays)
        id: checkpiers
        run: python tools/check_upstream.py overlays-piers

      - name: Check upstream (plain deps, informational)
        id: checkdeps
        run: python tools/check_upstream.py --deps

      - name: Open / update tracking issue
        if: steps.check.outputs.has_update == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Upstream update available for overlaid addons"
          body_file="${{ steps.check.outputs.summary_file }}"
          {
            echo ""
            echo "---"
            echo "How to apply a **SAFE** update:"
            echo "1. Bump \`base_version\` (and for gears, drop the new clean \`base/<id>-<ver>.zip\` + update \`base_zip_local\`)."
            echo "2. Bump \`overlay_version\` if you also changed Hebrew files."
            echo "3. Push; \`build-and-release\` reconstructs and ships it."
            echo ""
            echo "A **MANUAL** update means an upstream file we overlay changed -- re-merge just those files into \`overlays/<id>/files/\` before bumping."
            echo ""
            echo "_Auto-generated by upstream-watch._"
          } >> "$body_file"
          existing=$(gh issue list --state open --search "in:title $title" --json number -q '.[0].number')
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --body-file "$body_file"
            # body edits are SILENT on GitHub - comment so watchers get an email
            gh issue comment "$existing" --body-file "$body_file"
            echo "updated issue #$existing (+notification comment)"
          else
            gh issue create --title "$title" --body-file "$body_file"
          fi

      - name: Open / update tracking issue (dep updates, informational)
        if: steps.checkdeps.outputs.has_update == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Upstream dep updates available (informational)"
          body_file="${{ steps.checkdeps.outputs.summary_file }}"
          {
            echo ""
            echo "---"
            echo "Unmodified deps (scrapers, jurialmunkey family, skinshortcuts incl. the PIERS pin) are AUTO-ADOPTED by the next watch pass and shipped via the manifests - no action needed. Only skin.nimbus (our fork) and script.skinhelper (locally modded) stay manual: re-merge our changes before bumping."
            echo ""
            echo "_Auto-generated by upstream-watch._"
          } >> "$body_file"
          existing=$(gh issue list --state open --search "in:title $title" --json number -q '.[0].number')
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --body-file "$body_file"
            # body edits are SILENT on GitHub - comment so watchers get an email
            gh issue comment "$existing" --body-file "$body_file"
            echo "updated issue #$existing (+notification comment)"
          else
            gh issue create --title "$title" --body-file "$body_file"
          fi

      - name: Open / update tracking issue (Piers overlays)
        if: steps.checkpiers.outputs.has_update == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Upstream update available for PIERS overlaid skins"
          body_file="${{ steps.checkpiers.outputs.summary_file }}"
          {
            echo ""
            echo "---"
            echo "Piers fleet: SAFE-classified skin updates are auto-adopted (same AUTO_ADOPT gate as Omega, via --overlays-root overlays-piers); MANUAL-classified ones need a human to bump base_version/upstream_tag in \`overlays-piers/<id>/base.json\` after re-verifying on Kodi 22. \`build-and-release-piers\` reconstructs and ships either way."
            echo ""
            echo "_Auto-generated by upstream-watch._"
          } >> "$body_file"
          existing=$(gh issue list --state open --search "in:title $title" --json number -q '.[0].number')
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --body-file "$body_file"
            # body edits are SILENT on GitHub - comment so watchers get an email
            gh issue comment "$existing" --body-file "$body_file"
            echo "updated issue #$existing (+notification comment)"
          else
            gh issue create --title "$title" --body-file "$body_file"
          fi

      # ------------------------------------------------------------------
      # Auto-adopt SAFE updates. DORMANT by default -- this whole step is
      # skipped unless the repo variable AUTO_ADOPT is set to 'true'
      # (Settings > Secrets and variables > Actions > Variables). Until then
      # the watcher only alerts (issue above) and you adopt manually with
      # `python tools/adopt_upstream.py overlays/<id>`. Flip AUTO_ADOPT on
      # once you've watched a live update land in Kodi and trust the flow.
      # MANUAL updates are never auto-adopted -- they always wait for a human.
      # ------------------------------------------------------------------
      - name: Auto-adopt SAFE updates (gated by AUTO_ADOPT var)
        id: adopt
        if: vars.AUTO_ADOPT == 'true' && steps.check.outputs.has_update == 'true'
        run: python tools/adopt_upstream.py --all-safe --yes --no-build

      - name: Auto-adopt SAFE PIERS updates (gated by AUTO_ADOPT var)
        id: adoptpiers
        if: vars.AUTO_ADOPT == 'true' && steps.checkpiers.outputs.has_update == 'true'
        run: python tools/adopt_upstream.py --all-safe --yes --no-build --overlays-root overlays-piers

      - name: Auto-adopt whitelisted dep updates (gated by AUTO_ADOPT var)
        id: adoptdeps
        if: vars.AUTO_ADOPT == 'true'
        run: python tools/adopt_deps.py

      - name: Commit & push adopted bases
        if: vars.AUTO_ADOPT == 'true' && (steps.adopt.outputs.adopted == 'true' || steps.adoptpiers.outputs.adopted == 'true' || steps.adoptdeps.outputs.adopted == 'true')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "masterkodi-ci"
          git config user.email "ci@masterkodi.local"
          git add overlays/ overlays-piers/ addons/ build.json
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "ci: auto-adopt upstream update(s): ${{ steps.adopt.outputs.adopted_list }} ${{ steps.adoptpiers.outputs.adopted_list }} ${{ steps.adoptdeps.outputs.adopted_list }}"
            # rebase+retry: a concurrent fleet build may be committing its
            # manifest to main at the same moment
            for i in 1 2 3; do
              git pull --rebase --autostash origin main
              if git push origin HEAD:main; then break; fi
              [ "$i" = 3 ] && exit 1
              sleep 5
            done
            # GITHUB_TOKEN pushes DON'T fire on-push workflows (GitHub loop
            # protection) -- without these explicit dispatches an adopted
            # update would sit on main and never reach the manifests until
            # the next unrelated human push.
            gh workflow run build-and-release.yml
            gh workflow run build-and-release-piers.yml
          fi
