name: build-kodi-win

# Builds a PATCHED kodi.exe from official 21.3-Omega sources + our
# kodi-patches/*.diff (currently the PR 27320 python-crash backport).
# Output artifact: kodi.exe (+pdb) to overlay onto the official package in
# build-inputs. Manual dispatch only -- this is a ~2h build.

on:
  workflow_dispatch:
    inputs:
      kodi_tag:
        description: 'xbmc git tag to build'
        default: '21.3-Omega'

permissions:
  contents: write

jobs:
  kodi:
    # GitHub images now ship VS2026 everywhere (windows-2025 upgraded too),
    # which 21.3-Omega's vswhere.bat doesn't recognize. We install VS2022 Build
    # Tools if absent and pin xbmc's vswhere.bat to VS 17 explicitly below.
    runs-on: windows-2025
    timeout-minutes: 340
    env:
      KODI_TAG: ${{ github.event.inputs.kodi_tag || '21.3-Omega' }}
    steps:
      - name: Checkout build repo (patches)
        uses: actions/checkout@v4
        with:
          path: buildrepo

      - name: Checkout xbmc at tag
        uses: actions/checkout@v4
        with:
          repository: xbmc/xbmc
          ref: ${{ env.KODI_TAG }}
          path: xbmc
          fetch-depth: 1

      - name: Ensure VS2022 Build Tools (images now default to VS2026)
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installerswhere.exe"
          $vs22 = & $vswhere -products * -version "[17.0,18.0)" -property installationPath
          if ($vs22) { Write-Host "VS2022 present: $vs22"; exit 0 }
          Write-Host "VS2022 missing - installing Build Tools (VCTools workload)..."
          choco install visualstudio2022buildtools --no-progress -y --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended --quiet --norestart"
          $vs22 = & $vswhere -products * -version "[17.0,18.0)" -property installationPath
          if (-not $vs22) { Write-Error "VS2022 Build Tools install failed"; exit 1 }
          Write-Host "VS2022 installed: $vs22"

      - name: Pin xbmc vswhere.bat to VS2022 (vswhere -latest grabs VS2026)
        shell: bash
        run: |
          f=xbmc/tools/buildsteps/windows/vswhere.bat
          sed -i 's/%vswhere% -latest -property installationPath/%vswhere% -products * -version "[17.0,18.0)" -property installationPath/' "$f"
          grep -n '17.0,18.0' "$f"

      - name: Apply python-crash patches
        shell: bash
        run: |
          cd xbmc
          for p in ../buildrepo/kodi-patches/*.diff; do
            echo "applying $p"
            git apply --check "$p"
            git apply "$p"
          done
          git diff --stat

      - name: Download dependencies
        shell: cmd
        working-directory: xbmc\tools\buildsteps\windows\x64
        run: download-dependencies.bat

      - name: Download msys2 (ffmpeg toolchain)
        shell: cmd
        working-directory: xbmc\tools\buildsteps\windows\x64
        run: download-msys2.bat

      - name: Build mingw libs (ffmpeg)
        shell: cmd
        working-directory: xbmc\tools\buildsteps\windows\x64
        run: make-mingwlibs.bat noprompt

      - name: Build Kodi (no binary addons)
        shell: cmd
        working-directory: xbmc\tools\buildsteps\windows\x64
        run: BuildSetup.bat clean noprompt nobinaryaddons

      - name: Locate + stage kodi.exe
        shell: bash
        run: |
          set -e
          exe=$(find xbmc -name kodi.exe -path "*BUILD_WIN32*" | head -1)
          [ -z "$exe" ] && exe=$(find xbmc/kodi-build* xbmc/build -name kodi.exe 2>/dev/null | head -1)
          [ -z "$exe" ] && { echo "kodi.exe not found"; find xbmc -name kodi.exe | head; exit 1; }
          mkdir stage
          cp "$exe" stage/
          pdb=$(dirname "$exe")/kodi.pdb
          [ -f "$pdb" ] && cp "$pdb" stage/ || true
          sha256sum stage/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kodi-exe-patched-${{ env.KODI_TAG }}
          path: stage/
          retention-days: 30
