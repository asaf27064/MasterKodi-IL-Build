name: build-and-release

# Push an addon change -> CI rebuilds only what changed, ships it to the rolling
# 'addons-latest' release with a sha256 manifest, prunes dead assets, and commits
# the manifest. You never touch releases by hand.

on:
  push:
    branches: [main]
    paths:
      - 'addons/**'
      - 'overlays/**'
      - 'config/**'
      - 'build.json'
      - 'tools/**'
      - '.github/workflows/build-and-release.yml'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: fleet-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with committed manifest)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build deps
        run: pip install requests

      - name: Reconstruct Hebrew addons (clean upstream + overlay)
        # The Hebrew-modified addons are NOT committed as merged trees -- only
        # our overlay (overlays/<id>/) is. CI downloads clean upstream, strips
        # git junk / de-versions the folder, applies the overlay on top, and
        # writes the merged addon into addons/ so the normal build picks it up.
        # This keeps the Hebrew isolated + re-appliable to future upstreams.
        run: python tools/apply_overlay.py overlays addons

      - name: Build addon zips (reproducible)
        run: python tools/build_addons.py --repo-root . --out dist

      - name: Build config zip
        run: python tools/build_config.py --repo-root . --out dist

      - name: Generate manifest + diff
        run: python tools/gen_manifest.py --repo-root . --dist dist

      - name: Build install bundles (repack from fresh zips)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p originals
          for f in FenLight_Estuary.zip Arctic_Fuse_Skin.zip nimbus.zip; do
            gh release download base-builds --pattern "$f" --output "originals/$f" --clobber
          done
          python tools/build_bundles.py --repo-root . --dist dist --originals originals --out dist/bundles

      - name: Upload changed bundles to base-builds
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -s dist/bundles/bundles_changed.txt ]; then
            while IFS= read -r b; do
              [ -z "$b" ] && continue
              echo "uploading bundle $b"
              gh release upload base-builds "dist/bundles/$b" --clobber
            done < dist/bundles/bundles_changed.txt
          else
            echo "no bundle changes"
          fi

      - name: Ensure rolling release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view addons-latest >/dev/null 2>&1; then
            gh release create addons-latest \
              --title "MasterKodi IL - Addons (rolling)" \
              --notes "Rolling release. Assets are managed automatically by CI. See manifest.json on main." \
              --latest=false
          fi

      - name: Upload changed assets (clobber)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # zips FIRST, manifest LAST: a mid-loop failure must never leave a
          # published manifest advertising hashes the release doesn't hold yet
          if [ -s dist/changed.txt ]; then
            while IFS= read -r z; do
              [ -z "$z" ] && continue
              echo "uploading $z"
              gh release upload addons-latest "dist/$z" --clobber
            done < dist/changed.txt
          else
            echo "no changed assets to upload"
          fi
          # manifest is always refreshed on the release for clients that prefer it there
          gh release upload addons-latest manifest.json --clobber

      - name: Commit manifest.json
        run: |
          git config user.name "masterkodi-ci"
          git config user.email "ci@masterkodi.local"
          git add manifest.json bundles_state.json
          # --cached so this also detects a brand-new (untracked) manifest
          if git diff --cached --quiet; then
            echo "manifest unchanged"
          else
            # The manifest is GENERATED output -- the newest build must win.
            # 'pull --rebase' died on content conflicts when another manifest
            # commit landed mid-build (watch-dispatched vs push-triggered runs);
            # instead: stash the generated files, hard-sync to origin/main,
            # restore, commit on top. Retried for push races.
            for i in 1 2 3; do
              mkdir -p /tmp/gen && cp manifest.json bundles_state.json /tmp/gen/ 2>/dev/null || true
              git fetch origin main
              git reset --hard origin/main
              cp /tmp/gen/* . 2>/dev/null || true
              git add manifest.json bundles_state.json
              if git diff --cached --quiet; then echo "manifest already current"; break; fi
              git commit -m "ci: refresh manifest [skip ci]"
              if git push origin HEAD:main; then break; fi
              [ "$i" = 3 ] && exit 1
              sleep 5
            done
          fi

      - name: Prune orphan release assets
        # AFTER the manifest commit on purpose: pruning first meant a lost
        # push race left main's manifest pointing at freshly-deleted zips
        # (fleet 404s with no scheduled run to self-heal)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # delete any release asset not referenced by the current manifest
          # (keep manifest.json itself)
          gh release view addons-latest --json assets -q '.assets[].name' | while IFS= read -r name; do
            [ "$name" = "manifest.json" ] && continue
            if ! grep -qxF "$name" dist/valid_assets.txt; then
              echo "pruning orphan asset: $name"
              gh release delete-asset addons-latest "$name" -y || true
            fi
          done
