name: build-apk

# Builds the signed MasterKodi IL Android bootstrap APKs (arm64 + armeabi) in CI.
# The APK is a thin bootstrap: base Kodi + wizard/firstrun/repo + deps. The full
# build then arrives via the manifest updater. So this only needs to run when the
# bootstrap changes -> manual dispatch (or when the wizard/firstrun change).

on:
  workflow_dispatch:
    inputs:
      kodi_version:
        description: 'Base Kodi version'
        default: '21.3-Omega'
  push:
    branches: [main]
    paths:
      - 'addons/plugin.program.masterkodi.il.wizard/**'
      - 'addons/service.kodi.il.firstrun/**'
      - 'installers/android/**'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: write

# two rapid pushes must not clobber-upload out of order (an older
# installer landing LAST on the release) -- queue runs instead
concurrency:
  group: build-apk
  cancel-in-progress: false

jobs:
  apk:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm64-v8a, armeabi-v7a]
      fail-fast: false
    env:
      KODI_VER: ${{ github.event.inputs.kodi_version || '21.3-Omega' }}
      APKTOOL_VER: '2.12.1'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK (build-tools for zipalign/apksigner)
        uses: android-actions/setup-android@v3

      - name: Install build-tools 34.0.0
        run: sdkmanager "build-tools;34.0.0"

      - name: Install Pillow (icon resizing)
        run: python -m pip install --quiet pillow

      - name: Build addon zips (wizard/firstrun/repo + deps)
        run: python tools/build_addons.py --repo-root . --out dist

      - name: Fetch base Kodi APK + apktool (from our build-inputs release)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          ARCH="${{ matrix.arch }}"
          gh release download build-inputs --pattern "kodi-${KODI_VER}-${ARCH}.apk" --output base.apk --clobber
          gh release download build-inputs --pattern "apktool_${APKTOOL_VER}.jar" --output apktool.jar --clobber
          ls -la base.apk apktool.jar

      - name: Decode keystore
        env:
          KS: ${{ secrets.KEYSTORE_B64 }}
        run: echo "$KS" | base64 -d > kodi-il.keystore

      - name: Resolve zip paths
        id: zips
        run: |
          echo "wizard=$(ls dist/plugin.program.masterkodi.il.wizard-*.zip)" >> "$GITHUB_OUTPUT"
          echo "service=$(ls dist/service.kodi.il.firstrun-*.zip)" >> "$GITHUB_OUTPUT"
          echo "repo=$(ls dist/repository.masterkodi.il-*.zip)" >> "$GITHUB_OUTPUT"
          echo "bt=$ANDROID_SDK_ROOT/build-tools/34.0.0" >> "$GITHUB_OUTPUT"

      - name: Build + sign APK
        run: |
          python installers/android/build_kodi_il_apk_v3.py \
            --kodi-apk base.apk \
            --apktool-jar apktool.jar \
            --wizard-zip "${{ steps.zips.outputs.wizard }}" \
            --service-zip "${{ steps.zips.outputs.service }}" \
            --repo-zip "${{ steps.zips.outputs.repo }}" \
            --kodi-addons-dir addons \
            --build-tools-dir "${{ steps.zips.outputs.bt }}" \
            --keystore kodi-il.keystore \
            --alias "${{ secrets.KEYSTORE_ALIAS }}" \
            --storepass "${{ secrets.KEYSTORE_PASS }}" \
            --keypass "${{ secrets.KEYSTORE_PASS }}" \
            --icon installers/android/icon.png \
            --banner installers/android/banner.png \
            --splash installers/android/splash.png \
            --output "MasterKodiIL-${{ matrix.arch }}.apk"

      - name: Cleanup keystore
        if: always()
        run: rm -f kodi-il.keystore

      - name: Upload APK to installers release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view installers >/dev/null 2>&1; then
            gh release create installers --title "MasterKodi IL - Installers" \
              --notes "Signed EXE/APK bootstraps built by CI." --latest=false
          fi
          gh release upload installers "MasterKodiIL-${{ matrix.arch }}.apk" --clobber
