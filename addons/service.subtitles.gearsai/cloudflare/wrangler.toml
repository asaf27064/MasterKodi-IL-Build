name = "masterkodi-subpool"
main = "worker.js"
compatibility_date = "2026-06-22"

[[d1_databases]]
binding = "DB"
database_name = "masterkodi-subpool"
database_id = "855163c0-0672-4bd6-b2fb-78b7849c182e"

# Secrets (set via `wrangler secret put`, never in this file):
#   POOL_TOKEN   - client token the addon sends (X-Gears-Key)
#   ADMIN_TOKEN  - maintainer token for /v1/admin/* (X-Admin-Key)
#   GEMINI_KEYS  - comma-separated Gemini keys for /v1/translate
